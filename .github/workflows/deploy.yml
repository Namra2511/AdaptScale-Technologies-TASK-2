name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e

            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            APP_DIR="/home/ubuntu/cicd-demo-app"

            rm -rf $APP_DIR
            git clone https://github.com/${{ github.repository }}.git $APP_DIR
            cd $APP_DIR

            npm install --production

            export NODE_ENV=production
            export DEPLOY_TIME="${{ github.event.head_commit.timestamp }}"
            export APP_VERSION="${{ github.sha }}"

            pm2 describe cicd-demo-app > /dev/null 2>&1 \
              && pm2 reload cicd-demo-app --update-env \
              || pm2 start server.js --name cicd-demo-app

            pm2 save
          EOF

      - name: Health check
        run: |
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://${{ secrets.EC2_HOST }}:3000/health --max-time 15 || echo "000")
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed with status $STATUS"
            exit 1
          fi
          echo "App is live at http://${{ secrets.EC2_HOST }}:3000"
